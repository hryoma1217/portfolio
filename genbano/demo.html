/* ============================================================
   レイアウト & ルーティング
   ============================================================ */
const THEMES = [
  { id:"solid", label:"ゲンバ・ソリッド" }, { id:"saas", label:"モダンSaaS" },
  { id:"night", label:"ナイトシフト" }, { id:"hivis", label:"現場ハイビズ" },
];
let current = "dashboard";

function navHtml() {
  return NAV_GROUPS.map(g => {
    const items = g.items.map(it => {
      const act = it.href === current;
      const dim = BUILT.has(it.href) ? "" : "opacity-60";
      return `<a data-nav="${it.href}" class="flex cursor-pointer items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition ${dim} ${
        act ? "bg-primary text-primary-fg shadow-card" : "text-muted hover:bg-surface-2 hover:text-fg"}">
        ${icon(it.icon, "h-5 w-5 shrink-0")}${it.label}</a>`;
    }).join("");
    if (!g.label) return items;
    const hasActive = g.items.some(it => it.href === current);
    return `<div><div class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-xs font-semibold uppercase tracking-wider ${hasActive ? "text-primary" : "text-muted"}">
      <span class="flex-1 text-left">${g.label}</span></div>
      <div class="ml-1 grid gap-0.5">${items}</div></div>`;
  }).join("");
}

function render() {
  const fn = SCREENS[current] || (() => SCREENS._placeholder((NAV_GROUPS.flatMap(g=>g.items).find(i=>i.href===current)||{}).label || "画面"));
  const content = current && BUILT.has(current) ? fn() : SCREENS._placeholder((NAV_GROUPS.flatMap(g=>g.items).find(i=>i.href===current)||{}).label || "画面");
  document.getElementById("app").innerHTML = `
    <div class="min-h-screen">
      <div class="bg-primary/10 px-4 py-1.5 text-center text-xs text-primary">
        これは <b>ゲンバノ</b> の画面デモです（サンプルデータ・操作は保存されません）。テーマ切替やメニュー遷移をお試しいただけます。
      </div>
      <header class="sticky top-0 z-30 border-b border-line bg-surface/90 backdrop-blur">
        <div class="mx-auto flex h-14 max-w-content items-center gap-3 px-4">
          <a data-nav="dashboard" class="flex min-w-0 cursor-pointer items-center gap-2">
            <span class="grid h-8 w-8 shrink-0 place-items-center rounded-lg bg-primary text-primary-fg shadow-card">${icon("home","h-5 w-5")}</span>
            <span class="flex min-w-0 flex-col leading-tight">
              <span class="whitespace-nowrap text-base font-bold tracking-tight">ゲンバノ</span>
              <span class="truncate text-[11px] text-muted sm:hidden">${COMPANY}</span></span></a>
          <span class="hidden min-w-0 flex-1 truncate border-l border-line pl-3 text-sm text-muted sm:inline">${COMPANY}</span>
          <div class="ml-auto flex items-center gap-2">
            <select id="themeSel" class="field h-9 w-auto py-0 text-sm">${THEMES.map(t => `<option value="${t.id}">${t.label}</option>`).join("")}</select>
            <button class="btn-ghost !px-3" title="使い方ガイド">${icon("help","h-5 w-5")}</button>
            <button class="btn-ghost !px-3" title="通知">${icon("bell","h-5 w-5")}</button>
            <button class="btn-ghost !px-3" title="ログアウト">${icon("logout","h-5 w-5")}<span class="hidden text-xs font-medium sm:inline">ログアウト</span></button>
          </div>
        </div>
      </header>
      <div class="mx-auto flex max-w-content gap-6 px-4 py-6">
        <aside class="hidden w-56 shrink-0 lg:block"><div class="sticky top-20"><nav class="grid gap-0.5">${navHtml()}</nav></div></aside>
        <main class="min-w-0 flex-1">${content}</main>
      </div>
    </div>`;

  // イベント結線
  document.querySelectorAll("[data-nav]").forEach(el => el.addEventListener("click", () => {
    current = el.getAttribute("data-nav");
    location.hash = current;
    window.scrollTo(0, 0);
    render();
  }));
  const sel = document.getElementById("themeSel");
  sel.value = document.documentElement.dataset.theme || "solid";
  sel.addEventListener("change", () => { document.documentElement.dataset.theme = sel.value; });
}

// 初期表示（ハッシュ復元）
const hash = location.hash.replace("#", "");
if (hash) current = hash;
render();
</script>
</body>
</html>
